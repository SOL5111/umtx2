name: Deploy to Github Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_payload_update:
        description: 'Force payload update even if no changes'
        required: false
        default: 'false'
        type: boolean
  # Twice daily: 06:00 and 18:00 UTC
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.update.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Update payloads
        id: update
        run: |
          python .github/scripts/update_payloads.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate appcache manifest
        run: |
          python appcache_manifest_generator.py -d document/en/ps5

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            # Get list of changed payloads
            CHANGES=$(git diff --name-only | grep 'payloads/.*/metadata.json' | sed 's|document/en/ps5/payloads/||g' | sed 's|/metadata.json||g' | tr '\n' ', ' | sed 's/,$//')
            
            # Create detailed commit message
            if [ -n "$CHANGES" ]; then
              git add .
              git commit -m "chore(payloads): update $CHANGES

          Automated payload update:
          - Synced with latest GitHub releases
          - Updated metadata and changelogs
          - Verified compatibility

          Run: $(date '+%Y-%m-%d %H:%M UTC')"
              git push
            fi
          fi

  deploy:
    needs: update-payloads
    if: always() && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Run appcache_manifest_generator.py
        run: |
          python appcache_manifest_generator.py -d document/en/ps5

      - name: Update bizkut.github.io root site
        env:
          GH_TOKEN: ${{ secrets.BIZKUT_GITHUB_IO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing required secret: BIZKUT_GITHUB_IO_TOKEN"
            exit 1
          fi

          gh auth setup-git
          gh repo clone bizkut/bizkut.github.io github-io-site -- --branch master --depth 1
          rsync -a --delete --exclude '.git' document/en/ps5/ github-io-site/
          touch github-io-site/.nojekyll

          cd github-io-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: update root Pages site from bizkut/umtx2"
            git push origin master
          else
            echo "bizkut.github.io root site is already up to date"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'document/en/ps5'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
